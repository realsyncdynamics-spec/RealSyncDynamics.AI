name: Deploy to GitHub Pages

# ─────────────────────────────────────────────────────────────────
# STATUS: CANONICAL FRONTEND PIPELINE (verified 2026-05-16)
# ─────────────────────────────────────────────────────────────────
# This workflow ships the production frontend.
#
# `realsyncdynamicsai.de` zeigt DIREKT auf GitHub Pages (Anycast
# 185.199.108-111.153) und liefert die Bytes von dort via Fastly CDN.
# HINWEIS (nachgeprüft 2026-05-28): der Apex läuft NICHT mehr über einen
# VPS-Traefik-301-Hop — `curl -sI` liefert HTTP 200 direkt von GitHub.com,
# keinen Redirect. Die alte Beschreibung "Apex → VPS → Traefik 301 → Pages"
# ist veraltet; siehe docs/runtime/SYSTEMCHECK-2026-05-28.md.
#
# Verify:    curl -sI https://realsyncdynamicsai.de/ | grep server
#            → server: GitHub.com   (and HTTP/2 200, no 301)
#
# ADR:       docs/adr/0001-stay-on-supabase-gh-pages-for-v1.md
# Topology:  docs/runtime/production-runtime.md
#            docs/runtime/SYSTEMCHECK-2026-05-28.md  (latest live state)
# ─────────────────────────────────────────────────────────────────
#
# Builds the Vite SPA and publishes to GitHub Pages.
# With custom domain realsyncdynamicsai.de, VITE_BASE must be /
# Supabase secrets are optional -- if missing the app builds fine
# and runs in offline/demo mode.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Build
        env:
          VITE_BASE: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
      - name: Install Playwright Chromium for prerender
        run: npx playwright install --with-deps chromium
      - name: Real prerender (Playwright) for high-priority routes
        # Verwendet scripts/prerender.mjs (PR #131) — startet vite preview,
        # rendert jede sitemap-Route mit priority >= 0.6 in Headless-Chromium
        # und schreibt das vollstaendig hydrierte HTML als dist/<route>/index.html.
        # Crawler / Social-Bots / Slack-Preview sehen damit den echten
        # Section-Content statt nur des SPA-Shells.
        run: npm run prerender
      - name: SPA-fallback fuer Routes ohne Prerender + .nojekyll
        run: |
          # 404.html fuer SPA-fallback bei dynamischen Routes (z.B. /audit/share/:token)
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          # Routes mit priority < 0.6 sind nicht prerendered. Damit sie nicht
          # 404 liefern, bekommen sie eine Kopie des SPA-Shells (HTTP 200 +
          # client-side React-Hydration). Existierende prerendered Files werden
          # NICHT ueberschrieben — sie behalten ihren Real-Content.
          python3 - <<'PY'
          import os, re, shutil
          with open('public/sitemap.xml', 'r', encoding='utf-8') as f:
              xml = f.read()
          paths = re.findall(r'https?://realsyncdynamicsai\.de(/[^<\s]*)', xml)
          paths = set(p.rstrip('/') for p in paths if p and p != '/')

          # Authentifizierte Workspace-/App-Routen stehen NICHT in der Sitemap
          # (kein SEO), brauchen aber denselben 200-Shell-Fallback, damit
          # Direktaufruf + Refresh + Bookmark + E-Mail-Deep-Link sauber laden
          # (statt ueber 404.html-Redirect mit initialem 404-Status zu bouncen).
          # Liste mit src/App.tsx synchron halten.
          APP_ROUTES = [
              '/app', '/app/websites', '/app/ai-systems', '/app/risks',
              '/app/compliance', '/app/evidence', '/app/monitoring',
              '/app/team', '/app/settings', '/assistant',
              '/dashboard', '/command-center',
              '/governance', '/governance/admin', '/governance/agents',
              '/governance/incidents', '/governance/dpias', '/governance/dsr',
              '/governance/vendors', '/governance/reports', '/governance/auditor',
              '/governance/admin-log', '/governance/approvals', '/governance/scans',
              '/evidence', '/monitoring', '/runtime',
              '/settings', '/settings/team', '/settings/security',
              '/settings/account', '/settings/ai-residency', '/settings/api-keys',
              '/billing/usage', '/tenant/invites',
              '/checkout/starter', '/checkout/growth', '/checkout/agency',
          ]
          paths = sorted(paths | set(APP_ROUTES))
          src = 'dist/index.html'
          filled, skipped = 0, 0
          for p in paths:
              dest_dir = 'dist' + p
              dest_file = os.path.join(dest_dir, 'index.html')
              if os.path.exists(dest_file):
                  skipped += 1   # Real-prerendered, nicht anfassen
                  continue
              os.makedirs(dest_dir, exist_ok=True)
              shutil.copyfile(src, dest_file)
              filled += 1
              print(f'spa-fallback {p}')
          print(f'spa-fallback: {filled} filled · {skipped} kept-prerendered')
          PY
          ls -la dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
