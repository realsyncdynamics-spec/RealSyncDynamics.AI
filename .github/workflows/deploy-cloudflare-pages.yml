name: Deploy to Cloudflare Pages

# ─────────────────────────────────────────────────────────────────
# CLOUDFLARE PAGES — BUILD-VALIDIERUNG (+ optionaler Deploy)
# ─────────────────────────────────────────────────────────────────
# Der LIVE-Deploy laeuft ueber Cloudflares native Git-Integration
# (Pages baut/deployt direkt aus dem Repo, ganz ohne Repo-Secret).
# Die Live-Site ist darueber gruen (HTTP 200).
#
# Dieser Workflow ist daher primaer eine CI-Validierung: er laeuft
# `npm run lint` + `npm run build` bei jedem Push und stellt sicher,
# dass der Build nicht bricht.
#
# Der `deploy`-Job (Push via wrangler-action) ist OPTIONAL und laeuft
# NUR, wenn beide Repo-Secrets gesetzt sind:
#    - CLOUDFLARE_API_TOKEN
#    - CLOUDFLARE_ACCOUNT_ID
# Sind sie nicht gesetzt, werden `deploy`/`smoke-test` sauber
# uebersprungen (skipped, NICHT failed) — kein Dauer-Rot. Secrets
# koennen unter Repo → Settings → Secrets and variables → Actions
# nachgetragen werden; dann uebernimmt dieser Workflow den Deploy.
# Wer das tut, sollte zusaetzlich die Cloudflare-Git-Integration
# deaktivieren, damit nicht zwei Pfade gleichzeitig deployen.
#
# Build-Env-Variablen (GitHub Actions Secrets/Variables):
#    - VITE_SUPABASE_URL · VITE_SUPABASE_ANON_KEY
#    - VITE_SENTRY_DSN (optional) · VITE_STRIPE_PRICE_* (Checkout)
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'wrangler.toml'
      - '_redirects'
      - '_headers'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build SPA
    runs-on: ubuntu-latest
    # Signalisiert nachgelagerten Jobs, ob die Cloudflare-Credentials
    # vorhanden sind. Secrets sind in job-level `if:` nicht lesbar, darum
    # hier als Job-Output abgeleitet.
    outputs:
      cf_ready: ${{ steps.cfcheck.outputs.ready }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect Cloudflare credentials
        id: cfcheck
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "✓ Cloudflare-Credentials vorhanden — Deploy-Job laeuft."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare-Repo-Secrets nicht gesetzt — GitHub-Actions-Deploy wird uebersprungen. Live-Deploy laeuft ueber Cloudflares Git-Integration; dieser Workflow validiert nur Lint + Build."
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint TypeScript
        run: npm run lint

      - name: Build Vite
        env:
          VITE_BASE: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_STRIPE_PRICE_STARTER: ${{ secrets.VITE_STRIPE_PRICE_STARTER }}
          VITE_STRIPE_PRICE_GROWTH: ${{ secrets.VITE_STRIPE_PRICE_GROWTH }}
          VITE_STRIPE_PRICE_AGENCY: ${{ secrets.VITE_STRIPE_PRICE_AGENCY }}
          VITE_STRIPE_PRICE_SCALE: ${{ secrets.VITE_STRIPE_PRICE_SCALE }}
          VITE_STRIPE_PRICE_STARTER_YEARLY: ${{ secrets.VITE_STRIPE_PRICE_STARTER_YEARLY }}
          VITE_STRIPE_PRICE_GROWTH_YEARLY: ${{ secrets.VITE_STRIPE_PRICE_GROWTH_YEARLY }}
          VITE_STRIPE_PRICE_AGENCY_YEARLY: ${{ secrets.VITE_STRIPE_PRICE_AGENCY_YEARLY }}
          VITE_STRIPE_PRICE_SCALE_YEARLY: ${{ secrets.VITE_STRIPE_PRICE_SCALE_YEARLY }}
        run: npm run build

      - name: Generate legal pages markers
        run: npm run generate:legal-pages

      - name: Prerender high-priority routes
        run: |
          npx playwright install --with-deps chromium
          npm run prerender

      - name: Generate SPA fallback for dynamic routes
        run: |
          cp dist/index.html dist/404.html
          python3 - <<'PY'
          import os, re, shutil
          # Prerender routes from sitemap
          with open('public/sitemap.xml', 'r', encoding='utf-8') as f:
              xml = f.read()
          paths = re.findall(r'https?://realsyncdynamicsai\.de(/[^<\s]*)', xml)
          paths = set(p.rstrip('/') for p in paths if p and p != '/')

          # App routes (authenticated, not in sitemap)
          APP_ROUTES = [
              '/os', '/os/pricing',
              '/app', '/app/websites', '/app/ai-systems', '/app/automations', '/app/risks',
              '/app/compliance', '/app/evidence', '/app/monitoring',
              '/app/team', '/app/settings', '/app/company', '/assistant',
              '/dashboard', '/command-center',
              '/governance', '/governance/admin', '/governance/agents',
              '/governance/incidents', '/governance/dpias', '/governance/dsr',
              '/governance/vendors', '/governance/reports', '/governance/auditor',
              '/governance/admin-log', '/governance/approvals', '/governance/scans',
              '/evidence', '/monitoring', '/runtime',
              '/settings', '/settings/team', '/settings/security',
              '/settings/account', '/settings/ai-residency', '/settings/api-keys',
              '/billing/usage', '/tenant/invites',
              '/checkout/starter', '/checkout/growth', '/checkout/agency', '/checkout/enterprise', '/checkout/scale',
              '/checkout/starter_yearly', '/checkout/growth_yearly', '/checkout/agency_yearly', '/checkout/enterprise_yearly', '/checkout/scale_yearly',
          ]
          paths = sorted(paths | set(APP_ROUTES))
          src = 'dist/index.html'
          filled, skipped = 0, 0
          for p in paths:
              dest_dir = 'dist' + p
              dest_file = os.path.join(dest_dir, 'index.html')
              if os.path.exists(dest_file):
                  skipped += 1
                  continue
              os.makedirs(dest_dir, exist_ok=True)
              shutil.copyfile(src, dest_file)
              filled += 1
          print(f'spa-fallback: {filled} filled · {skipped} kept-prerendered')
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    # Nur ausfuehren, wenn die Repo-Secrets vorhanden sind. Andernfalls sauber
    # uebersprungen (skipped) — der Live-Deploy laeuft ueber Cloudflares
    # Git-Integration und braucht diesen Job nicht.
    if: needs.build.outputs.cf_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      # cloudflare/pages-action@v1 ist deprecated (lehnt u. a. `productionBranch`
      # ab). Maintainter Weg: wrangler-action@v3 mit `pages deploy`.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=realsyncdynamics-ai --branch=main

  smoke-test:
    name: Smoke test live routes
    needs: [build, deploy]
    # Lief deploy (mangels Secrets) nicht, gibt es nichts zu pruefen.
    if: needs.build.outputs.cf_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CDN propagation
        run: sleep 15

      - name: Check critical routes
        run: |
          BASE="https://realsyncdynamicsai.de"
          ROUTES="/ /pricing /audit /governance-runtime /app"
          FAILED=""
          for path in $ROUTES; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 15 "${BASE}${path}" || echo "000")
            echo "${path}  →  HTTP ${code}"
            if [ "$code" != "200" ]; then
              FAILED="$FAILED $path(${code})"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Smoke-test failed for:$FAILED"
            exit 1
          fi
          echo "✓ All routes returned 200"
