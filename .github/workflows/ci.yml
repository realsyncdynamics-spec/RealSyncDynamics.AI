name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  db:
    runs-on: ubuntu-latest
    name: Migration validation
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Bootstrap Supabase-equivalent stubs
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          CREATE EXTENSION IF NOT EXISTS vector;

          -- Supabase roles
          DO $$ BEGIN
            CREATE ROLE anon NOLOGIN;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN
            CREATE ROLE authenticated NOLOGIN;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN
            CREATE ROLE service_role NOLOGIN BYPASSRLS;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN
            CREATE ROLE authenticator NOINHERIT NOLOGIN;
          EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          GRANT anon TO authenticator;
          GRANT authenticated TO authenticator;
          GRANT service_role TO authenticator;

          -- auth schema stub
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id               UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            email            TEXT UNIQUE,
            raw_user_meta_data JSONB,
            created_at       TIMESTAMPTZ DEFAULT now()
          );
          CREATE OR REPLACE FUNCTION auth.uid()  RETURNS UUID LANGUAGE sql STABLE AS 'SELECT NULL::uuid';
          CREATE OR REPLACE FUNCTION auth.role() RETURNS TEXT LANGUAGE sql STABLE AS 'SELECT $$authenticated$$::text';

          -- vault schema stub (Supabase Vault)
          CREATE SCHEMA IF NOT EXISTS vault;
          CREATE TABLE IF NOT EXISTS vault.secrets (
            id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            name        TEXT UNIQUE,
            secret      TEXT,
            description TEXT,
            created_at  TIMESTAMPTZ DEFAULT now(),
            updated_at  TIMESTAMPTZ DEFAULT now()
          );
          CREATE OR REPLACE VIEW vault.decrypted_secrets AS
            SELECT id, name, secret AS decrypted_secret, description, created_at, updated_at
            FROM vault.secrets;
          CREATE OR REPLACE FUNCTION vault.create_secret(
            p_secret text, p_name text, p_description text DEFAULT ''
          ) RETURNS uuid LANGUAGE sql AS $$
            INSERT INTO vault.secrets (secret, name, description)
            VALUES (p_secret, p_name, p_description)
            ON CONFLICT (name) DO UPDATE SET secret = EXCLUDED.secret
            RETURNING id;
          $$;

          -- cron schema stub (pg_cron)
          CREATE SCHEMA IF NOT EXISTS cron;
          CREATE TABLE IF NOT EXISTS cron.job (
            jobid    BIGSERIAL PRIMARY KEY,
            schedule TEXT,
            command  TEXT,
            nodename TEXT    DEFAULT 'localhost',
            nodeport INT     DEFAULT 5432,
            database TEXT    DEFAULT 'postgres',
            username TEXT    DEFAULT 'postgres',
            active   BOOLEAN DEFAULT true,
            jobname  TEXT UNIQUE
          );
          CREATE OR REPLACE FUNCTION cron.schedule(
            p_name text, p_schedule text, p_command text
          ) RETURNS bigint LANGUAGE sql AS $$
            INSERT INTO cron.job (jobname, schedule, command)
            VALUES (p_name, p_schedule, p_command)
            ON CONFLICT (jobname) DO UPDATE
              SET schedule = EXCLUDED.schedule, command = EXCLUDED.command
            RETURNING jobid;
          $$;
          CREATE OR REPLACE FUNCTION cron.unschedule(p_name text) RETURNS boolean LANGUAGE sql AS $$
            DELETE FROM cron.job WHERE jobname = p_name; SELECT true;
          $$;

          -- net schema stub (pg_net)
          CREATE SCHEMA IF NOT EXISTS net;
          CREATE OR REPLACE FUNCTION net.http_post(
            url text,
            headers jsonb DEFAULT '{}'::jsonb,
            body    jsonb DEFAULT '{}'::jsonb,
            timeout_milliseconds int DEFAULT 5000
          ) RETURNS bigint LANGUAGE sql AS 'SELECT 1::bigint';

          -- storage schema stub (Supabase Storage)
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE TABLE IF NOT EXISTS storage.buckets (
            id          TEXT PRIMARY KEY,
            name        TEXT NOT NULL,
            public      BOOLEAN DEFAULT false,
            created_at  TIMESTAMPTZ DEFAULT now(),
            updated_at  TIMESTAMPTZ DEFAULT now()
          );
          CREATE TABLE IF NOT EXISTS storage.objects (
            id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            bucket_id   TEXT REFERENCES storage.buckets(id) ON DELETE CASCADE,
            name        TEXT NOT NULL,
            owner       UUID,
            created_at  TIMESTAMPTZ DEFAULT now(),
            updated_at  TIMESTAMPTZ DEFAULT now(),
            metadata    JSONB
          );
          ALTER TABLE storage.objects ENABLE ROW LEVEL SECURITY;
          CREATE OR REPLACE FUNCTION storage.foldername(name text) RETURNS text[]
            LANGUAGE sql IMMUTABLE AS $$
              SELECT string_to_array(regexp_replace(name, '/[^/]*$', ''), '/')
            $$;
          SQL

      - name: Apply all migrations in order
        run: |
          set -e
          for f in supabase/migrations/*.sql; do
            echo "::group::$(basename "$f")"
            psql -v ON_ERROR_STOP=1 -f "$f"
            echo "::endgroup::"
          done

      - name: Verify migrations are append-only
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[hotfix]')
        run: |
          set -e
          changed=$(git diff --name-only origin/main...HEAD -- 'supabase/migrations/' || true)
          modified_existing=""
          for f in $changed; do
            if git cat-file -e "origin/main:$f" 2>/dev/null; then
              if ! git diff --quiet "origin/main" -- "$f"; then
                modified_existing="$modified_existing $f"
              fi
            fi
          done
          if [ -n "$modified_existing" ]; then
            echo "❌ append-only rule broken; do not edit merged migrations:"
            for f in $modified_existing; do echo "  $f"; done
            echo
            echo "If this is a fix for a migration that has never applied"
            echo "successfully (e.g. SQL syntax error caught by CI on the"
            echo "very first run), prefix the PR title with [hotfix]."
            exit 2
          fi
          echo "✅ migrations are append-only"
