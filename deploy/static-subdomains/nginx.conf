# Innenleben des nginx-Containers — Host-Routing macht Traefik, nginx muss
# nur per Host-Header wissen, aus welchem /srv-Pfad er serviert.

# Health-Endpoint (Traefik-unabhängig — antwortet auf allen Hosts).
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Fallback für unbekannte Hosts (sollte Traefik nie weiterleiten).
    location / {
        return 404;
    }
}

# cdn.realsyncdynamicsai.de — versionierte, immutable Assets.
server {
    listen 80;
    server_name cdn.realsyncdynamicsai.de;
    root /srv/cdn;

    server_tokens off;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    # Versionierte Pfade (/v1/, /v2/, …) sind per Konvention immutable.
    location ~ ^/[^/]+/v\d+/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri $uri/ =404;
    }
}

# schemas.realsyncdynamicsai.de — JSON-Schema-Dokumente.
server {
    listen 80;
    server_name schemas.realsyncdynamicsai.de;
    root /srv/schemas;

    server_tokens off;
    gzip on;
    gzip_types application/json application/schema+json;
    gzip_min_length 512;

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    # JSON-Schema-Dokumente: ETag + kurze Cache-Zeit (selten, aber unversioniert).
    location ~ \.(json|schema\.json)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        add_header Content-Type "application/schema+json; charset=utf-8" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

# preview.realsyncdynamicsai.de — Rebuild-Workflow-Previews. Niemals cachen.
server {
    listen 80;
    server_name preview.realsyncdynamicsai.de;
    root /srv/preview;
    index index.html;

    server_tokens off;

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ $uri/index.html =404;
    }
}
