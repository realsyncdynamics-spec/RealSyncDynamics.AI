name: Cloudflare Domain Cutover (one-shot)

# ─────────────────────────────────────────────────────────────────────────
# Einmaliger Cutover: bindet realsyncdynamicsai.de + www an das Pages-Projekt
# realsyncdynamics-ai, ersetzt die alten GitHub-Pages-DNS-Records durch einen
# proxied CNAME auf <projekt>.pages.dev und purged den Zonen-Cache.
#
# Nutzt die bereits vorhandenen Repo-Secrets CLOUDFLARE_API_TOKEN /
# CLOUDFLARE_ACCOUNT_ID (dieselben, mit denen Pages erfolgreich deployt).
# Laeuft automatisch beim Push dieser Datei + manuell via workflow_dispatch.
#
# Idempotent & defensiv: loescht NUR Apex/www-Records, die auf GitHub Pages
# (185.199.108-111.153) bzw. github.io/pages.dev zeigen. MX, TXT/SPF und andere
# Subdomains (z. B. chat.) bleiben unangetastet. Schlaegt bei fehlenden
# DNS-Rechten nicht hart fehl, sondern berichtet, was das Token kann.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ['claude/function-chaos-investigation-0u1r68']
    paths: ['.github/workflows/cloudflare-domain-cutover.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cf-domain-cutover
  cancel-in-progress: false

jobs:
  cutover:
    name: Bind domain + fix DNS + purge
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT: realsyncdynamics-ai
      APEX: realsyncdynamicsai.de
      PAGES_TARGET: realsyncdynamics-ai.pages.dev
      API: https://api.cloudflare.com/client/v4
    steps:
      - name: Preflight — Credentials & Token-Scopes
        run: |
          set -u
          [ -z "${CF_API_TOKEN:-}" ] && { echo "::error::CLOUDFLARE_API_TOKEN fehlt"; exit 1; }
          [ -z "${CF_ACCOUNT_ID:-}" ] && { echo "::error::CLOUDFLARE_ACCOUNT_ID fehlt"; exit 1; }
          echo "## Token-Verify" >> "$GITHUB_STEP_SUMMARY"
          curl -sS -H "Authorization: Bearer $CF_API_TOKEN" "$API/user/tokens/verify" \
            | tee /tmp/verify.json | jq -r '.success, (.messages//[])[].message' || true
          echo '```json' >> "$GITHUB_STEP_SUMMARY"; cat /tmp/verify.json >> "$GITHUB_STEP_SUMMARY"; echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Bind custom domains to Pages project
        run: |
          set -u
          for d in "$APEX" "www.$APEX"; do
            echo "── add custom domain: $d"
            resp=$(curl -sS -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
              "$API/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT/domains" \
              --data "{\"name\":\"$d\"}")
            echo "$resp" | jq -r 'if .success then "  ✓ gebunden/queued: \(.result.name) status=\(.result.status//"?")" else "  ! \(.errors)" end' || echo "$resp"
          done
          echo "Hinweis: 'already exists' (Code 8000007 o.ä.) ist OK — Domain war schon registriert."

      - name: Resolve zone id
        run: |
          set -u
          ZID=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" "$API/zones?name=$APEX" | jq -r '.result[0].id // empty')
          if [ -z "$ZID" ]; then
            echo "::warning::Zone $APEX nicht lesbar (Token ohne Zone:Read?) — DNS-Schritt wird uebersprungen, Domain-Bindung ist trotzdem erfolgt."
          else
            echo "  ✓ zone id: $ZID"
          fi
          echo "ZONE_ID=$ZID" >> "$GITHUB_ENV"

      - name: Reconcile DNS (replace GitHub-Pages records with proxied CNAME)
        if: env.ZONE_ID != ''
        run: |
          set -u
          base="$API/zones/$ZONE_ID/dns_records"
          # alle Records fuer apex + www holen
          recs=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" "$base?per_page=200")
          echo "$recs" | jq -r '.result[] | "  vorhanden: \(.type)\t\(.name)\t\(.content)\tproxied=\(.proxied)"' || true

          # zu loeschende Records: NUR apex/www, die auf GitHub Pages / github.io / pages.dev zeigen
          gh_ips='["185.199.108.153","185.199.109.153","185.199.110.153","185.199.111.153"]'
          del_ids=$(echo "$recs" | jq -r --arg apex "$APEX" --argjson ips "$gh_ips" '
            .result[]
            | select(.name == $apex or .name == ("www." + $apex))
            | select(
                ((.type == "A" or .type == "AAAA") and (.content as $c | ($ips | index($c)) != null))
                or (.type == "A" and (.content | startswith("185.199.10")))
                or (.type == "CNAME" and ((.content | test("github\\.io")) or (.content | test("pages\\.dev"))))
              )
            | .id')

          for id in $del_ids; do
            echo "── delete record $id"
            curl -sS -X DELETE -H "Authorization: Bearer $CF_API_TOKEN" "$base/$id" \
              | jq -r 'if .success then "  ✓ geloescht" else "  ! \(.errors)" end' || true
          done
          [ -z "$del_ids" ] && echo "  (keine GitHub-Pages-Records auf apex/www gefunden — evtl. schon sauber)"

          # proxied CNAME apex -> pages target sicherstellen
          ensure_cname() {
            local name="$1"
            local exists
            exists=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" "$base?type=CNAME&name=$name" \
              | jq -r --arg t "$PAGES_TARGET" '.result[] | select(.content==$t) | .id' | head -1)
            if [ -n "$exists" ]; then
              echo "  ✓ CNAME $name -> $PAGES_TARGET existiert ($exists)"
              return
            fi
            echo "── create CNAME $name -> $PAGES_TARGET (proxied)"
            curl -sS -X POST -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
              "$base" --data "{\"type\":\"CNAME\",\"name\":\"$name\",\"content\":\"$PAGES_TARGET\",\"proxied\":true,\"ttl\":1}" \
              | jq -r 'if .success then "  ✓ angelegt: \(.result.name)" else "  ! \(.errors)" end' || true
          }
          ensure_cname "$APEX"
          ensure_cname "www.$APEX"

      - name: Purge cache
        if: env.ZONE_ID != ''
        run: |
          set -u
          curl -sS -X POST -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
            "$API/zones/$ZONE_ID/purge_cache" --data '{"purge_everything":true}' \
            | jq -r 'if .success then "  ✓ Cache purged" else "  ! \(.errors)" end' || true

      - name: Verify apex now serves the Pages build
        run: |
          set -u
          echo "Warte auf Propagation…"; sleep 25
          want=$(curl -sS "https://$PAGES_TARGET/" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          got=$(curl -sS "https://$APEX/" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          hdr=$(curl -sSI "https://$APEX/" | grep -iE 'via:|x-served-by:|cf-cache-status:|last-modified:' || true)
          {
            echo "## Verifikation"
            echo "- pages.dev asset: \`$want\`"
            echo "- apex asset:     \`$got\`"
            echo '- apex headers:'; echo '```'; echo "$hdr"; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "pages.dev: $want"
          echo "apex:      $got"
          echo "$hdr"
          if [ -n "$want" ] && [ "$want" = "$got" ]; then
            echo "✅ Apex liefert jetzt den aktuellen Pages-Build."
          else
            echo "::warning::Apex-Hash != pages.dev — evtl. noch Propagation/Cache, oder DNS-Rechte fehlten. Logs oben pruefen."
          fi
