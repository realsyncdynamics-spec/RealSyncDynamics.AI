# governance-dsr and governance-vendors were declared here without
# corresponding supabase/functions/<name>/index.ts, which broke
# `supabase functions deploy` (entrypoint path does not exist). UI
# code in src/features/governance/{dsrApi,vendorsApi}.ts still
# invokes these names — those calls return 404 today and will keep
# returning 404 until the functions are actually implemented. The
# right fix when picking that up is to implement both functions (or
# remove the dead UI calls). For now we keep the deploy unblocked.

# ── Legacy debug/setup helpers ──
# Previously held `verify_jwt = false` entries for `debug-secret-shape`,
# `vault-set-secret` and `vault-key-setter` — none of those functions
# exist in `supabase/functions/` any more. Leaving the per-function
# stanzas in place would auto-deploy a future re-add (or accidental
# rename) as a public endpoint, so the entries are removed entirely.
# Provision secrets directly via `supabase secrets set` or the Vault
# dashboard.

# All other functions (stripe-checkout, stripe-portal, ai-invoke,
# workflow-trigger, gdpr-export, gdpr-delete, tenant-invite,
# stripe-meter-sync, governance-agent, governance-remediate,
# hostinger-agent-brief, kodee*, audit-report-email, generate-document,
# shopify-scan, skills, sub-processor-notify, evidence-vault-export,
# usage-increment, ceo-brief-pdf, pitch-deck-pdf) keep the default
# verify_jwt = true — they require an authenticated user session.
