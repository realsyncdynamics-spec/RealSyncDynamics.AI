name: Deploy

# Pushes pending migrations and (optionally) edge functions to the linked
# Supabase project. Auto-runs on main; manual via workflow_dispatch.
#
# Required repository secrets:
#   SUPABASE_ACCESS_TOKEN       personal access token (account -> Access Tokens)
#   SUPABASE_PROJECT_ID         project ref (the xxxx in xxxx.supabase.co)
#   SUPABASE_DB_PASSWORD        the linked project's DB password

on:
  push:
      branches: [main]
          paths:
                - 'supabase/migrations/**'
                      - 'supabase/functions/**'
                            - 'supabase/config.toml'
                              workflow_dispatch:
                                  inputs:
                                        deploy_functions:
                                                description: 'Deploy edge functions too?'
                                                        type: boolean
                                                                default: false

                                                                jobs:
                                                                  db-push:
                                                                      name: Push migrations
                                                                          runs-on: ubuntu-latest
                                                                              env:
                                                                                    SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                                                                                          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
                                                                                              steps:
                                                                                                    - uses: actions/checkout@v4
                                                                                                    
                                                                                                          - name: Verify required secrets
                                                                                                                  run: |
                                                                                                                            missing=""
                                                                                                                                      [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
                                                                                                                                                [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ] && missing="$missing SUPABASE_PROJECT_ID"
                                                                                                                                                          [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ] && missing="$missing SUPABASE_DB_PASSWORD"
                                                                                                                                                                    if [ -n "$missing" ]; then
                                                                                                                                                                                echo "missing secrets:$missing"
                                                                                                                                                                                            exit 1
                                                                                                                                                                                                      fi
                                                                                                                                                                                                      
                                                                                                                                                                                                            - uses: supabase/setup-cli@v1
                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                              version: latest
                                                                                                                                                                                                                              
                                                                                                                                                                                                                                    - name: Link project
                                                                                                                                                                                                                                            run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                  - name: Push pending migrations
                                                                                                                                                                                                                                                          run: supabase db push --include-all 2>&1 || true
                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                            functions-deploy:
                                                                                                                                                                                                                                                                name: Deploy edge functions
                                                                                                                                                                                                                                                                    runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                        env:
                                                                                                                                                                                                                                                                              SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                                                                                                                                                                                                                                                                                    SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
                                                                                                                                                                                                                                                                                        steps:
                                                                                                                                                                                                                                                                                              - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                    - uses: supabase/setup-cli@v1
                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                      version: latest
                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                            - name: Deploy edge functions
                                                                                                                                                                                                                                                                                                                                    run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
