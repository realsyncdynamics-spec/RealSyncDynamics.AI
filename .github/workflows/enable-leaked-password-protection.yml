name: Enable Leaked Password Protection

# Einmaliger, manuell ausloesbarer Workflow, der die Supabase-Auth-Einstellung
# "Leaked Password Protection" (HaveIBeenPwned) via Management-API setzt.
# Hintergrund: docs/runtime/SYSTEMCHECK-2026-05-28.md (Advisor
# auth_leaked_password_protection). Diese Einstellung ist KEIN DB-Objekt und
# laesst sich daher nur ueber die Management-API oder das Dashboard schalten.
#
# Voraussetzung: Repo-Secrets SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_ID
# (bereits fuer deploy.yml vorhanden).
#
# WICHTIG: workflow_dispatch ist ueber die GitHub-UI ("Run workflow") erst
# triggerbar, wenn diese Datei auf dem DEFAULT-Branch (main) liegt. Bis zum
# Merge alternativ per API/CLI gegen den Feature-Branch ausloesen.

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: 'password_hibp_enabled (true/false)'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  set-hibp:
    runs-on: ubuntu-latest
    steps:
      - name: Preconditions
        run: |
          [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && { echo "::error::SUPABASE_ACCESS_TOKEN fehlt"; exit 1; } || true
          [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ]   && { echo "::error::SUPABASE_PROJECT_ID fehlt";   exit 1; } || true

      - name: PATCH auth config (password_hibp_enabled)
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_ID }}
          ENABLED: ${{ inputs.enabled }}
        run: |
          set -euo pipefail
          echo "Setze password_hibp_enabled=${ENABLED} fuer Projekt ${REF}"
          resp=$(curl -sS -X PATCH \
            "https://api.supabase.com/v1/projects/${REF}/config/auth" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"password_hibp_enabled\": ${ENABLED}}")
          echo "PATCH-Response: $resp"

      - name: Verify
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_ID }}
          ENABLED: ${{ inputs.enabled }}
        run: |
          set -euo pipefail
          actual=$(curl -sS \
            "https://api.supabase.com/v1/projects/${REF}/config/auth" \
            -H "Authorization: Bearer ${TOKEN}" \
            | grep -o '"password_hibp_enabled":[^,}]*' || true)
          echo "Aktueller Wert: ${actual:-<Feld nicht gefunden>}"
          case "$actual" in
            *"$ENABLED"*) echo "✅ password_hibp_enabled=${ENABLED} bestaetigt." ;;
            *) echo "::error::Wert nicht wie erwartet gesetzt (${actual:-leer})."; exit 1 ;;
          esac
