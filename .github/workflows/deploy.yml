name: Deploy

# Pushes pending migrations and (optionally) edge functions to the linked
# Supabase project. Auto-runs on main; manual via workflow_dispatch.
#
# Required repository secrets:
#   SUPABASE_ACCESS_TOKEN    personal access token (account -> Access Tokens)
#   SUPABASE_PROJECT_ID      project ref (the xxxx in xxxx.supabase.co)
#   SUPABASE_DB_PASSWORD     the linked project's DB password

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: 'Deploy edge functions too?'
        type: boolean
        default: false

jobs:
  db-push:
    name: Push migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=""
          [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "${{ secrets.SUPABASE_PROJECT_ID }}"   ] && missing="$missing SUPABASE_PROJECT_ID"
          [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}"  ] && missing="$missing SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "missing secrets:$missing"
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Repair remote-only migrations
        run: |
          # Get list of remote-only migrations and mark them as reverted
          python3 - << 'PYEOF'
          import subprocess, os, re
          result = subprocess.run(['supabase', 'migration', 'list', '--linked'], 
                                  capture_output=True, text=True)
          output = result.stdout + result.stderr
          print("Migration list output:")
          print(output)
          for line in output.splitlines():
            # Match lines with version number that indicate remote-only state
            m = re.search(r'(\d{14})', line)
            if m and ('REMOTE' in line.upper() or ('YES' in line.upper() and 'NO' in line.upper())):
              version = m.group(1)
              # Check if local file exists
              local_files = [f for f in os.listdir('supabase/migrations') 
                            if f.startswith(version)] if os.path.exists('supabase/migrations') else []
              if not local_files:
                print(f"Marking remote-only migration {version} as reverted")
                subprocess.run(['supabase', 'migration', 'repair', '--status', 'reverted', version],
                               check=False)
          PYEOF
          echo "Repair step complete"

      - name: Push pending migrations
        run: supabase db push

  functions-deploy:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    needs: db-push
    if: github.event_name == 'push' || inputs.deploy_functions == true
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: |
          supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
