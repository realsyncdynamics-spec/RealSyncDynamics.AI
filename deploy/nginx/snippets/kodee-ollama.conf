# /etc/nginx/snippets/kodee-ollama.conf
#
# Bearer-protected Reverse-Proxy auf die lokale Ollama-Instanz (127.0.0.1:11434).
# Wird vom Apex-Vhost realsyncdynamicsai.de.conf mit `include` reingezogen,
# damit kein eigener DNS-Record + cert nötig ist.
#
# Öffentliche Routen (jeweils mit Bearer):
#   GET  /_kodee/ollama/            → 200 health check
#   POST /_kodee/ollama/api/chat    → /api/chat upstream
#   GET  /_kodee/ollama/api/tags    → /api/tags upstream
#
# Alles andere unter /_kodee/ollama/ → 404. Insb. /api/pull, /api/delete,
# /api/create bleiben für die Außenwelt unsichtbar — Modell-Management nur
# über SSH auf der Box.
#
# __OLLAMA_BEARER_TOKEN__ wird vom install-ollama-vps.sh ersetzt.

# Health
location = /_kodee/ollama/ {
    set $expected_auth "Bearer __OLLAMA_BEARER_TOKEN__";
    if ($http_authorization != $expected_auth) {
        return 401 '{"error":"unauthorized"}';
    }
    add_header Content-Type application/json always;
    return 200 '{"service":"ollama-proxy","status":"ok"}';
}

# Chat (lange Inferenzen → großzügige Timeouts)
location = /_kodee/ollama/api/chat {
    set $expected_auth "Bearer __OLLAMA_BEARER_TOKEN__";
    if ($http_authorization != $expected_auth) {
        return 401 '{"error":"unauthorized"}';
    }
    proxy_set_header Authorization "";
    proxy_set_header Host localhost;
    proxy_connect_timeout  10s;
    proxy_send_timeout     180s;
    proxy_read_timeout     180s;
    client_max_body_size   2m;
    proxy_buffering off;
    proxy_pass http://127.0.0.1:11434/api/chat;
}

# Tag-Liste (Health/Modell-Inventar für Edge-Function)
location = /_kodee/ollama/api/tags {
    set $expected_auth "Bearer __OLLAMA_BEARER_TOKEN__";
    if ($http_authorization != $expected_auth) {
        return 401 '{"error":"unauthorized"}';
    }
    proxy_set_header Authorization "";
    proxy_set_header Host localhost;
    proxy_pass http://127.0.0.1:11434/api/tags;
}

# Catch-all unter dem Prefix → 404. Schützt vor /api/pull etc. von außen.
location ^~ /_kodee/ollama/ {
    return 404 '{"error":"not found"}';
    add_header Content-Type application/json always;
}
