name: Deploy to GitHub Pages

# Builds the Vite SPA and publishes to GitHub Pages.
# First successful run auto-creates + enables the Pages site (no manual
# Settings → Pages click needed) thanks to the `pages: write` permission
# on the deploy step.
#
# URL after first run: https://realsyncdynamics-spec.github.io/RealSyncDynamics.AI/
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VITE_SUPABASE_URL        e.g. https://ebljyceifhnlzhjfyxup.supabase.co
#   VITE_SUPABASE_ANON_KEY   the anon/publishable key

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Allow only one concurrent deployment, skip queued runs in between.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_BASE: /RealSyncDynamics.AI/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing required secrets VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY."
            echo "::error::Set them at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          npm run build

      - name: SPA fallback + Jekyll bypass
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          ls -la dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
