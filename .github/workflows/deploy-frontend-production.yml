name: Deploy Frontend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'docker/realsync-web/**'
      - '.github/workflows/deploy-frontend-production.yml'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Deploy to Production
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" << 'EOF'
          set -e

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Deploying to PRODUCTION (realsyncdynamicsai.de)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date)"
          echo ""

          cd "$VPS_DEPLOY_PATH"

          # Pull latest code
          git fetch origin
          git checkout origin/main

          # Deploy to production
          cd docker/realsync-web
          echo "[1/5] Building Docker image (production)..."
          docker compose build --progress=plain

          echo ""
          echo "[2/5] Creating backup of current container..."
          docker compose stop frontend || true
          docker tag realsync-frontend:latest realsync-frontend:backup || true

          echo ""
          echo "[3/5] Starting new container..."
          docker compose up -d

          echo ""
          echo "[4/5] Waiting for healthcheck..."
          sleep 10

          echo ""
          echo "[5/5] Verifying deployment..."
          if docker compose ps | grep -q "healthy"; then
            echo ""
            echo "✅ PRODUCTION deployment successful!"
            echo "URL: https://realsyncdynamicsai.de"
            echo "Status: LIVE"
          else
            echo "❌ Container not healthy! Rolling back..."
            docker compose down
            docker tag realsync-frontend:backup realsync-frontend:latest || true
            docker compose up -d
            exit 1
          fi
          EOF

  verify-production:
    needs: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Health check
        run: |
          echo "Waiting for production to stabilize..."
          for i in {1..5}; do
            echo "Attempt $i/5..."
            if curl -f -s -o /dev/null -w "%{http_code}" https://realsyncdynamicsai.de | grep -q "200"; then
              echo "✅ Production is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Production health check failed"
          exit 1

  notify:
    needs: [deploy-production, verify-production]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ] && [ "${{ needs.verify-production.result }}" == "success" ]; then
            echo "SUCCESS=true" >> $GITHUB_OUTPUT
          else
            echo "SUCCESS=false" >> $GITHUB_OUTPUT
          fi

      - name: Production deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Production Deployment Status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deploy: ${{ needs.deploy-production.result }}"
          echo "Verify: ${{ needs.deploy-production.result }}"
          echo ""

          if [ "${{ steps.status.outputs.SUCCESS }}" == "true" ]; then
            echo "✅ PRODUCTION DEPLOYMENT SUCCESSFUL"
            echo "URL: https://realsyncdynamicsai.de"
            echo "Status: LIVE"
          else
            echo "❌ PRODUCTION DEPLOYMENT FAILED"
            exit 1
          fi
