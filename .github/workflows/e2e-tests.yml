name: E2E Tests (Playwright)

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Start preview server and run E2E
        run: |
          # Start the preview server (serves built app, more reliable than dev)
          echo "Starting preview server..."
          npm run preview > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to be ready (health check)
          echo "Waiting for server..."
          SERVER_READY=0
          for i in {1..90}; do
            if curl -f -s http://localhost:4173/ > /dev/null 2>&1; then
              echo "✅ Server is ready at http://localhost:4173"
              SERVER_READY=1
              break
            fi
            echo "⏳ Attempt $i/90..."
            sleep 1
          done

          if [ $SERVER_READY -eq 0 ]; then
            echo "❌ Server failed to start"
            cat /tmp/server.log
            kill $SERVER_PID || true
            exit 1
          fi

          # Run E2E tests
          echo "Running E2E tests..."
          npm run e2e || TEST_EXIT=$?
          TEST_EXIT=${TEST_EXIT:-0}

          # Cleanup
          kill $SERVER_PID || true
          sleep 1

          exit $TEST_EXIT
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: /tmp/server.log
          retention-days: 7
