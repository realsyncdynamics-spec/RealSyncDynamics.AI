name: tests

# Runs on every push and PR. The matrix covers all currently-supported
# Python versions declared in pyproject.toml::requires-python. If we
# drop or add a minor version there, mirror the change here.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Verify sample bundle (end-to-end CLI smoke)
        run: |
          realsync verify data/sample_bundle.json --pubkey data/demo.pub.pem
          # Negative path: tampered bundle MUST exit non-zero.
          if realsync verify data/tampered_bundle.json; then
            echo "FAIL: tampered bundle verified as PASSED"
            exit 1
          fi
