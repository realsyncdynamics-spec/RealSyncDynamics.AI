# /etc/nginx/sites-available/realsyncdynamicsai.de.conf
#
# Drop into the VPS as part of the one-time setup, then symlink:
#   sudo ln -sf /etc/nginx/sites-available/realsyncdynamicsai.de.conf \
#               /etc/nginx/sites-enabled/realsyncdynamicsai.de.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# certbot --nginx will automatically inject the ssl_certificate / listen 443
# directives below; this template assumes they're already in place.

# ── 80: redirect everything to HTTPS ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name realsyncdynamicsai.de www.realsyncdynamicsai.de;

    # Allow Let's Encrypt HTTP-01 challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://realsyncdynamicsai.de$request_uri;
    }
}

# ── 443: SPA + security headers ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name realsyncdynamicsai.de;

    # certbot manages these:
    # ssl_certificate     /etc/letsencrypt/live/realsyncdynamicsai.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/realsyncdynamicsai.de/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/realsyncdynamicsai.de/dist;
    index index.html;

    # Vite-hashed assets are immutable; cache aggressively.
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|svg|png|jpg|webp|avif)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"           always;
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # CSP: tightened so we trust ourselves + Supabase + Stripe.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' https://js.stripe.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com;" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hide nginx version
    server_tokens off;

    # Reasonable client limits
    client_max_body_size 5m;
}

# ── 443: www → apex redirect ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.realsyncdynamicsai.de;

    # certbot --nginx will request a cert that covers www. too if you pass it
    # both names; until then this block needs the same cert as above or its own.
    return 301 https://realsyncdynamicsai.de$request_uri;
}
