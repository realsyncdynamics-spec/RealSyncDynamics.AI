version: "3.8"

services:
  organizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gmail-organizer
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_FILE=/app/logs/organizer.log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
