# Supabase local development config.
# https://supabase.com/docs/guides/cli/config
#
# Used by `supabase start` (local stack) and `supabase db reset`. Project-link
# data lives outside the repo (~/.supabase) and is unrelated to this file.

project_id = "realsyncdynamics-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329

[realtime]
enabled = true

[studio]
enabled = false

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[edge_runtime]
enabled = false

[analytics]
enabled = false

# ──────────────────────────────────────────────────────────────────────────
# Per-function verify_jwt config.
#
# `supabase functions deploy` reads this for each function. Default is true.
# Anything listed here as false bypasses the platform JWT gateway — the
# function itself is responsible for its own auth (HMAC signature, signed
# tokens, public free-tool semantics, cron-triggered, etc.).
#
# CRITICAL: webhook receivers (stripe-webhook, shopify-webhooks,
# governance-ingest, governance-webhooks, workflow-callback,
# newsletter-confirm) MUST stay false — external callers cannot send a
# Supabase JWT. Same goes for OAuth callbacks (shopify-callback) and
# Stripe-redirect handoffs (checkout-website-rebuild).
# ──────────────────────────────────────────────────────────────────────────

# ── External webhooks (no JWT possible) ──
[functions.stripe-webhook]
verify_jwt = false

[functions.shopify-webhooks]
verify_jwt = false

[functions.shopify-callback]
verify_jwt = false

[functions.workflow-callback]
verify_jwt = false

[functions.governance-ingest]
verify_jwt = false

[functions.governance-webhooks]
verify_jwt = false

[functions.newsletter-confirm]
verify_jwt = false

[functions.checkout-website-rebuild]
verify_jwt = false

# ── Public free tools / anonymous ingress ──
[functions.gdpr-audit]
verify_jwt = false

# Health-Probe — oeffentlich, fuer Uptime-Monitoring und Status-Page.
# Antwortet 200 / 503; keine sensiblen Daten, keine Auth noetig.
[functions.health]
verify_jwt = false

[functions.cookie-scan]
verify_jwt = false

[functions.cookie-scan-deep]
verify_jwt = false

# AI Gateway — provider-neutral inference endpoint. Public per spec
# (frontend talks to it directly without bearer tokens). The actual auth
# + rate-limit + tenant-scope checks live inside the function once it
# starts handling tenant-scoped traffic in a follow-up PR.
[functions.ai-gateway]
verify_jwt = false

[functions.audit-report-pdf]
verify_jwt = false

[functions.sales-lead]
verify_jwt = false

[functions.newsletter-subscribe]
verify_jwt = false

[functions.track-pageview]
verify_jwt = false

[functions.marketing-event]
verify_jwt = false

[functions.telemetry-ai-event]
verify_jwt = false

[functions.welcome-email]
verify_jwt = false

[functions.shopify-install]
verify_jwt = false

[functions.rebuild-website]
verify_jwt = false

[functions.market-scanner]
verify_jwt = false

[functions.ai-act-classify]
