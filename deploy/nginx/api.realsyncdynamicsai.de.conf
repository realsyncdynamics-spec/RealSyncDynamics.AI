# /etc/nginx/sites-available/api.realsyncdynamicsai.de.conf
#
# Reverse-Proxy fuer den OpenClaw-Compliance-Agent (services/openclaw-agent),
# laufend als Docker-Container hinter 127.0.0.1:3001 (siehe systemd-Unit
# services/openclaw-agent/openclaw-agent.service).
#
# Drop in via:
#   sudo cp deploy/nginx/api.realsyncdynamicsai.de.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/api.realsyncdynamicsai.de.conf \
#               /etc/nginx/sites-enabled/api.realsyncdynamicsai.de.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.realsyncdynamicsai.de
#
# certbot ergaenzt anschliessend die ssl_certificate-Direktiven automatisch.

# ── 80: ACME + Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.realsyncdynamicsai.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.realsyncdynamicsai.de$request_uri;
    }
}

# ── 443: Reverse-Proxy auf OpenClaw (127.0.0.1:3001) ────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.realsyncdynamicsai.de;

    # certbot --nginx managed:
    # ssl_certificate     /etc/letsencrypt/live/api.realsyncdynamicsai.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.realsyncdynamicsai.de/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security-Header (CORS wird vom Agent selber gemacht — hier nichts setzen)
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "no-referrer"                       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    server_tokens off;
    client_max_body_size 2m;

    # ── /healthz, /api/chat ──────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OpenAI-Tool-Call-Roundtrips koennen bis ~60s dauern (gpt-4o-mini + 2 Tools).
        proxy_connect_timeout 10s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;
        proxy_buffering       off;
    }

    # ── /ws — WebSocket-Upgrade ──────────────────────────────────────────────
    location = /ws {
        proxy_pass http://127.0.0.1:3001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WS-Connections: 1h Idle bevor proxy_read_timeout zuschlaegt.
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }
}
