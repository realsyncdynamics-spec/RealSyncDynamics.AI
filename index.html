      Security headers via meta-equivalents.
      GitHub Pages doesn't let us set HTTP-headers, so we declare what we can:

      Referrer-Policy für privacy. These improve our own /audit score significantly.
    -->

          content="frame-ancestors 'self'; default-src 'self' https://*.supabase.co https://api.fontshare.com data:; script-src 'self' 'unsafe-inline' https://connect.facebook.net https://www.googletagmanager.com https://www.google-analytics.com https://analytics.tiktok.com https://snap.licdn.com; style-src 'self' 'unsafe-inline' https://api.fontshare.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://*.supabase.in https://www.facebook.com https://www.google-analytics.com https://analytics.tiktok.com https://*.tiktok.com https://px.ads.linkedin.com" />

    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <script type="text/javascript">
