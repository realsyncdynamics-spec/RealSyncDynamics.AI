name: E2E Tests (Playwright)

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # CI testet den PR-eigenen Build über einen lokalen Preview-Server.
      # Die Live-Produktion ist als Ziel ungeeignet: ihr Bot-Schutz liefert
      # dem headless-Browser 403. Für manuelle Läufe gegen Live/Staging:
      #   E2E_BASE_URL=https://… npm run e2e
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'http://localhost:4173' }}
      STRIPE_TEST_MODE: 'true'
      TEST_EMAIL: ${{ secrets.TEST_EMAIL || '' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start Preview Server
        run: |
          npx vite preview --port 4173 --host 127.0.0.1 > preview-server.log 2>&1 &
          echo "PREVIEW_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Preview Server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4173 > /dev/null; then
              echo "Preview-Server ist erreichbar."
              exit 0
            fi
            sleep 2
          done
          echo "Preview-Server nicht erreichbar — Log:"; cat preview-server.log
          exit 1

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
