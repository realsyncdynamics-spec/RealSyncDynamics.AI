# Vite-Build SPA — alle Routes fallen auf index.html zurück (BrowserRouter).
# Caching: Vite-hashed assets sind unveränderlich, alles andere no-cache.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite-Assets immutable cachen
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|webp|avif|gif|ico)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA-Fallback — alle unbekannten Pfade liefern index.html aus
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Security-Header
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Hide nginx version
    server_tokens off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
