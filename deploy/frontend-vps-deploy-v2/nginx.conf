# Container-interne nginx-Config für die Vite-SPA.
# Wird via Dockerfile.frontend nach /etc/nginx/conf.d/frontend.conf kopiert.
#
# Diese Config terminiert KEIN TLS — der Host-Reverse-Proxy (Traefik oder
# Host-nginx auf 80/443) übernimmt das und reicht HTTP an den Container
# weiter. Security-Headers stehen trotzdem hier, damit sie auch bei direktem
# Container-Zugriff (Debug, interne Tests) gesetzt sind.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # ── Healthcheck ─────────────────────────────────────────────────────────
    # Wird vom Docker-HEALTHCHECK und vom Host-Reverse-Proxy genutzt.
    # Statische Datei, keine Logs.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        try_files /healthz =200;
    }

    # ── Immutable assets — aggressiv cachen ────────────────────────────────
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|svg|png|jpg|webp|avif)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA-Fallback ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ── Security-Headers (Spiegel der Host-nginx-Config) ───────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options   "nosniff"                               always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # CSP identisch zur Host-Config — Supabase + Stripe whitelisted.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' https://js.stripe.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com;" always;

    # Kompression.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 5m;
}
