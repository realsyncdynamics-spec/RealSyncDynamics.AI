# /etc/nginx/sites-available/ollama.realsyncdynamicsai.de.conf
#
# Reverse-proxy für die lokale Ollama-Instanz auf dem Kodee-VPS.
# Erreichbarkeit: nur über HTTPS + Bearer-Token (siehe Variable OLLAMA_BEARER_TOKEN).
#
# Schritte zum Aktivieren (siehe scripts/install-ollama-vps.sh):
#   1. Domain ollama.realsyncdynamicsai.de auf den VPS zeigen lassen (A-Record).
#   2. Datei nach /etc/nginx/sites-available kopieren, BEARER-Token einsetzen.
#   3. Symlink + nginx -t + reload.
#   4. certbot --nginx -d ollama.realsyncdynamicsai.de
#
# Ollama selbst lauscht auf 127.0.0.1:11434 (siehe systemd-Drop-In im Skript).
# Dieser Block ist die einzige öffentlich erreichbare Tür.

server {
    listen 80;
    listen [::]:80;
    server_name ollama.realsyncdynamicsai.de;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ollama.realsyncdynamicsai.de;

    # certbot --nginx füllt ssl_certificate / ssl_certificate_key beim ersten Run.

    # Bearer-Auth: jeder Request muss exakt diesen Header tragen.
    # ${OLLAMA_BEARER_TOKEN} wird vom Setup-Skript ersetzt.
    set $expected_auth "Bearer __OLLAMA_BEARER_TOKEN__";
    if ($http_authorization != $expected_auth) {
        return 401 '{"error":"unauthorized"}';
    }

    # Kein Logging von Auth-Headern.
    proxy_set_header Authorization "";

    # Inferenz auf CPU dauert lang — großzügige Timeouts.
    proxy_connect_timeout  10s;
    proxy_send_timeout     180s;
    proxy_read_timeout     180s;

    # Body-Limit großzügig fürs lange Prompts.
    client_max_body_size   2m;

    # Keine ungewollten Endpunkte exponieren — nur /api/chat + /api/tags + Health.
    location = / {
        return 200 '{"service":"ollama-proxy","status":"ok"}';
        add_header Content-Type application/json;
    }

    location = /api/chat {
        proxy_pass http://127.0.0.1:11434;
        proxy_set_header Host $host;
        proxy_buffering off;          # streame Chunks ohne Pufferung
    }

    location = /api/tags {
        proxy_pass http://127.0.0.1:11434;
        proxy_set_header Host $host;
    }

    # Alles andere blockieren — keine /api/pull, /api/delete, etc. nach außen.
    location / {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
    }
}
