name: Deploy to Cloudflare Pages

# ─────────────────────────────────────────────────────────────────
# STATUS: PREPARED / NICHT AKTIV bis Secrets gesetzt sind.
# ─────────────────────────────────────────────────────────────────
# Reproduzierbarer, CI-gesteuerter Production-Deploy der Vite-SPA auf das
# Cloudflare-Pages-Projekt `realsyncdynamics-ai`.
#
# WARUM: Die DNS von realsyncdynamicsai.de wurde nach dem 2026-06-05-Stand
# (GitHub Pages, A 185.199.108-111.153) auf Cloudflare umgezogen (proxied,
# 104.21.x / 172.67.x). Seitdem liefert die Apex 404/500, weil:
#   1) die Custom Domain NICHT an das Pages-Projekt gebunden ist, und
#   2) das aktuelle Production-Deployment den SPA-Fallback (_redirects)
#      nicht aktiv hat (Deep-Links wie /landing -> 404 auf *.pages.dev).
# Siehe docs/infra/cloudflare-pages-cutover.md fuer die vollstaendige Analyse.
#
# Dieser Workflow behebt Punkt (2): jeder Push auf main baut frisch (inkl.
# public/_redirects, public/_headers, 404.html) und deployt nach Cloudflare
# Pages. Punkt (1) — Custom-Domain-Bindung — ist eine einmalige Aktion im
# Cloudflare-Dashboard und in der Doku beschrieben.
#
# SICHERHEIT: Keine geheimen Werte im Repo. Der Job ueberspringt sich selbst
# sauber (Warnung statt rotem Build), solange folgende Repo-Secrets fehlen:
#   CLOUDFLARE_API_TOKEN   (Scope: Account > Cloudflare Pages > Edit)
#   CLOUDFLARE_ACCOUNT_ID  (Account-ID deb7c1635d0ca94143256fc2feb98d4a)
# Optional (sonst Demo/Offline-Build):
#   VITE_SUPABASE_URL · VITE_SUPABASE_ANON_KEY · VITE_SENTRY_DSN
#
# GitHub Pages (deploy-pages.yml) bleibt bewusst parallel aktiv, bis die
# Cloudflare-Pages-Production unter der Custom Domain verifiziert 200 liefert.
# ─────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy-cloudflare-pages.yml'

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build + deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require Cloudflare secrets (skip cleanly if absent)
        run: |
          missing=""
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]  && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::warning::Cloudflare Pages deploy skipped — missing repo secrets:$missing"
            echo "## Cloudflare Pages deploy skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Missing secrets:$missing — see docs/infra/cloudflare-pages-cutover.md" >> "$GITHUB_STEP_SUMMARY"
            echo "CF_SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Setup Node
        if: env.CF_SKIP != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        if: env.CF_SKIP != 'true'
        run: npm ci

      - name: Build SPA (VITE_BASE=/ for custom domain)
        if: env.CF_SKIP != 'true'
        env:
          VITE_BASE: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Verify SPA fallback is in the build artifact
        if: env.CF_SKIP != 'true'
        run: |
          test -f dist/index.html   || { echo "::error::dist/index.html missing"; exit 1; }
          test -f dist/_redirects   || { echo "::error::dist/_redirects missing (SPA fallback)"; exit 1; }
          echo "dist/_redirects -> $(cat dist/_redirects)"

      - name: Deploy to Cloudflare Pages
        if: env.CF_SKIP != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=realsyncdynamics-ai --branch=main
