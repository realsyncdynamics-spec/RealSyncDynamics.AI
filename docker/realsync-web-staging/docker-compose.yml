# docker-compose.yml — RealSyncDynamics.AI Frontend STAGING (test.realsyncdynamicsai.de)
#
# Identisch zu Production, aber mit Staging-Domain + Container-Name.
# Läuft parallel zur Production auf demselben VPS.

version: '3.8'

services:
  frontend:
    build:
      context: ../..
      dockerfile: docker/realsync-web-staging/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_GOOGLE_GENAI_API_KEY: ${VITE_GOOGLE_GENAI_API_KEY}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}

    container_name: realsync-frontend-staging
    restart: unless-stopped

    networks:
      - internal
      - traefik_proxy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

      # ── Router: test.realsyncdynamicsai.de (Staging) ──────────────────
      - "traefik.http.routers.realsync-frontend-staging.rule=Host(`test.realsyncdynamicsai.de`) || Host(`staging.realsyncdynamicsai.de`)"
      - "traefik.http.routers.realsync-frontend-staging.entrypoints=websecure"
      - "traefik.http.routers.realsync-frontend-staging.tls=true"
      - "traefik.http.routers.realsync-frontend-staging.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.realsync-frontend-staging.service=realsync-frontend-staging"

      # ── Service ──────────────────────────────────────────────────────
      - "traefik.http.services.realsync-frontend-staging.loadbalancer.server.port=80"

networks:
  internal:
    driver: bridge
  traefik_proxy:
    external: true
    name: ${TRAEFIK_NETWORK}
