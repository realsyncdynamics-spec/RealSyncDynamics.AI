# Security headers for realsyncdynamicsai.de — Hostinger nginx vhost.
#
# Install:
#   sudo cp infra/nginx/security-headers.conf /etc/nginx/snippets/realsync-security-headers.conf
#   # then in the realsyncdynamicsai.de server { … } block, add:
#   include /etc/nginx/snippets/realsync-security-headers.conf;
#   sudo nginx -t && sudo systemctl reload nginx
#
# Verifikation:
#   curl -I https://realsyncdynamicsai.de | grep -iE 'strict-transport|x-frame|permissions-policy|referrer|x-content'

# ── Befund 1 (KRITISCH): HSTS ─────────────────────────────────────
# Force-upgrade alle Browser auf HTTPS für 2 Jahre. includeSubDomains
# weil app.realsyncdynamicsai.de etc. denselben Schutz brauchen. preload
# erlaubt den Eintrag in Chromium-/Firefox-Preload-Liste — set NUR
# wenn ihr sicher seid dass auch Sub-Domains HTTPS-only sind.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ── Befund 4 (HOCH): X-Frame-Options ──────────────────────────────
# Modern: CSP frame-ancestors 'self' (bereits in index.html via meta).
# Legacy: X-Frame-Options als Belt-and-Suspenders für Safari < 15 und
# alte Outlook/Email-Client-Renderer.
add_header X-Frame-Options "SAMEORIGIN" always;

# ── Härtung-Beifang (sicher und kostenlos) ────────────────────────
# Nosniff: blockt MIME-Sniffing-Tricks.
add_header X-Content-Type-Options "nosniff" always;

# Cross-Origin-Embedder-Policy / Resource-Policy nur wenn keine
# fremden iframes/embeds geladen werden — wir nutzen die Supabase-
# REST/Realtime und Fontshare als sub-resource, beide same-origin
# kompatibel via CORS. Bei Problemen Permission-Policy aufweichen.

# Permissions-Policy schaltet sensible Browser-APIs aus, die wir nicht
# brauchen. Lange Liste, aber jede Direktive ist explizit.
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;

# Referrer-Policy: identisch zur <meta>-Variante in index.html, hier als
# HTTP-Header weil ältere Browser die Meta-Variante teils ignorieren.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
