name: realsync-cli

# Smoke gate for the offline evidence-bundle verifier (P0.1 in docs/pilot).
# Triggers only when files under tools/realsync-cli/** change, so it stays
# cheap on PRs that don't touch the CLI.

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/realsync-cli/**'
      - '.github/workflows/realsync-cli.yml'
  push:
    branches: [main]
    paths:
      - 'tools/realsync-cli/**'
      - '.github/workflows/realsync-cli.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: tools/realsync-cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tools/realsync-cli/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Verify sample bundle (positive path)
        run: realsync verify data/sample_bundle.json --pubkey data/demo.pub.pem

      - name: Verify tampered bundle (negative path — MUST exit non-zero)
        run: |
          if realsync verify data/tampered_bundle.json; then
            echo "FAIL: tampered bundle verified as PASSED"
            exit 1
          fi

      - name: Replay sample bundle (chronological)
        run: realsync replay data/sample_bundle.json
