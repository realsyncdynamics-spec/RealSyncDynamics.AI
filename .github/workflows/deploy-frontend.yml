name: Deploy Frontend (VPS Fallback — optional)

# ─────────────────────────────────────────────────────────────────
# STATUS: OPTIONAL / VPS FALLBACK — non-blocking (updated 2026-06-05)
# ─────────────────────────────────────────────────────────────────
# PRIMARY PRODUCTION FRONTEND = deploy-cloudflare-pages.yml (Cloudflare Pages)
# This workflow is NOT the live user-facing frontend path.
#
# realsyncdynamicsai.de → Cloudflare Pages (project: realsyncdynamics-ai)
# VPS (187.77.89.1) serves only backend subdomains:
#   chat/ollama/n8n.realsyncdynamicsai.de
#
# This workflow rsyncs `dist/` to the VPS for potential backend-side
# asset access (e.g. server-side rendering, internal tooling).
# A failure here DOES NOT affect the live site.
#
# ⚠ continue-on-error: true — VPS SSH timeout or missing secrets
#   will produce a warning, not a red build.
#
# SSH timeout issue (2026-06-05): Port 22 on 187.77.89.1 is timing out.
# To fix: check Hostinger firewall → ensure port 22 is open for GitHub
# Actions IPs, or switch to a non-standard SSH port.
#
# Builds the Vite app and ships dist/ to the VPS via SSH+rsync.
# Triggers on push to main when frontend sources change, plus manual dispatch.
#
# Required repo secrets:
#   VPS_SSH_HOST            currently 187.77.89.1 (Hostinger srv1622293) — older
#                            value 72.61.89.191 is the obsolete frontend VPS,
#                            don't use it
#   VPS_SSH_USER            e.g. deploy
#   VPS_SSH_KEY             OpenSSH private key (BEGIN OPENSSH PRIVATE KEY ...)
#   VPS_SSH_KNOWN_HOST      output of `ssh-keyscan -t ed25519 <host>`
#   VPS_FRONTEND_PATH       absolute path on VPS, currently
#                            /var/www/realsyncdynamicsai.de/dist (bind-mounted
#                            into the kodee-frontend nginx container — see
#                            deploy/ollama-traefik/docker-compose.yml)
#                            ⚠ NOTE 2026-05-16: kodee-frontend container is
#                            NOT in that docker-compose. See STATUS above.
#   VITE_SUPABASE_URL       e.g. https://ebljyceifhnlzhjfyxup.supabase.co
#   VITE_SUPABASE_ANON_KEY  Supabase anon public key (baked into the bundle)
#
# Missing secrets fail the job fast at the verify step.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + ship to VPS (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets (warn only — non-blocking)
        run: |
          missing=""
          for key in VPS_SSH_HOST VPS_SSH_USER VPS_SSH_KEY VPS_SSH_KNOWN_HOST VPS_FRONTEND_PATH VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            value=$(jq -r --arg k "$key" '.[$k] // empty' <<<'${{ toJson(secrets) }}')
            [ -z "$value" ] && missing="$missing $key"
          done
          if [ -n "$missing" ]; then
            echo "::warning::VPS deploy skipped — missing secrets:$missing"
            echo "VPS_DEPLOY_SKIP=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Playwright Chromium for prerender
        run: npx playwright install chromium --with-deps

      - name: Pre-render top routes (priority >= 0.6)
        # Erzeugt static HTML pro Route in dist/<route>/index.html, damit
        # nicht-JS-rendering Crawler (LinkedIn, Slack, archive.org) den
        # vollständigen hydrierten Content sehen statt nur den SPA-Shell.
        # SKIP_PRERENDER=1 wenn schnell deploy ohne Prerender nötig.
        run: npm run prerender
        env:
          PRERENDER_PRIORITY_MIN: '0.6'
          PRERENDER_CONCURRENCY: '3'
          # Fail wenn rendered routes < expected — verhindert silent SEO-Regression
          PRERENDER_STRICT: '1'
          # Vite preview braucht die Supabase-Keys zur Laufzeit (auch wenn
          # nicht alle Routes Supabase-Calls machen — Hydration evaluiert die env)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Configure SSH
        if: env.VPS_DEPLOY_SKIP != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync dist/ to VPS
        if: env.VPS_DEPLOY_SKIP != 'true'
        timeout-minutes: 5
        run: |
          rsync \
            --archive \
            --delete \
            --compress \
            --human-readable \
            --stats \
            --timeout=60 \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o ConnectTimeout=30" \
            dist/ \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:${{ secrets.VPS_FRONTEND_PATH }}/" \
          || echo "::warning::VPS rsync failed (SSH timeout or unreachable host) — live site on Cloudflare Pages unaffected"

      - name: Smoke-test live site (Cloudflare Pages)
        run: |
          for i in 1 2 3; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 15 https://realsyncdynamicsai.de/ || echo "000")
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "::warning::public URL did not return 200 — check Cloudflare Pages deploy-cloudflare-pages.yml"
