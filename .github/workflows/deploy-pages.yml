name: Deploy to GitHub Pages

# Builds the Vite SPA and publishes to GitHub Pages.
# With custom domain realsyncdynamicsai.de, VITE_BASE must be /
# Supabase secrets are optional -- if missing the app builds fine
# and runs in offline/demo mode.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Build
        env:
          VITE_BASE: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
      - name: SPA fallback + pre-render routes for HTTP 200 (SEO + social-bots)
        run: |
          # 404.html für SPA-fallback (browser-only — liefert weiterhin 404-status)
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          # Pre-render: für jede sitemap-URL eine eigene <route>/index.html anlegen,
          # damit GH-Pages HTTP 200 für SEO-Crawler / Social-Bots / Monitoring liefert.
          # Dynamische Routes (z.B. /audit/share/:token) sind in der sitemap nicht
          # gelistet und bleiben wie bisher SPA-fallback (404 + JS-routing).
          python3 - <<'PY'
          import os, re, shutil
          with open('public/sitemap.xml', 'r', encoding='utf-8') as f:
              xml = f.read()
          # Extrahiere alle apex-Pfade (alles nach realsyncdynamicsai.de/)
          paths = re.findall(r'https?://realsyncdynamicsai\.de(/[^<\s]*)', xml)
          # Sortiere unique, ohne leeren Apex-Pfad
          paths = sorted(set(p.rstrip('/') for p in paths if p and p != '/'))
          src = 'dist/index.html'
          for p in paths:
              dest_dir = 'dist' + p
              dest_file = os.path.join(dest_dir, 'index.html')
              os.makedirs(dest_dir, exist_ok=True)
              shutil.copyfile(src, dest_file)
              print(f'pre-rendered {p}')
          print(f'total routes pre-rendered: {len(paths)}')
          PY
          ls -la dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
