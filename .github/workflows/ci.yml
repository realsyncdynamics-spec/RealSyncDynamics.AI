name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

  db:
    runs-on: ubuntu-latest
    name: Migration validation
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations from scratch
        run: supabase db reset --debug

      - name: Verify migrations are append-only
        run: |
          # Block PRs that modify any migration file already merged on main.
          if git diff --name-only origin/main...HEAD | grep -E '^supabase/migrations/' | xargs -r -I{} bash -c '
            f="{}"
            if git cat-file -e "origin/main:$f" 2>/dev/null; then
              if ! git diff --quiet "origin/main" -- "$f"; then
                echo "❌ migration modified: $f"
                exit 2
              fi
            fi
          '; then
            echo "✅ migrations are append-only"
          else
            exit 1
          fi
        if: github.event_name == 'pull_request'
