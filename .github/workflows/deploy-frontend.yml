name: Deploy Frontend

# ─────────────────────────────────────────────────────────────────
# STATUS: AMBIGUOUS — verify before deletion (audited 2026-05-16)
# ─────────────────────────────────────────────────────────────────
# This workflow rsyncs `dist/` to /var/www/realsyncdynamicsai.de/dist
# on the Hostinger VPS. The original comment claims the path is
# bind-mounted into a `kodee-frontend` nginx container.
#
# However: the docker-compose at deploy/ollama-traefik/docker-compose.yml
# defines `kodee-ollama`, `kodee-chat`, `kodee-apex` (the redirect
# router), `kodee-n8n` — but NO `kodee-frontend` container. And the
# `kodee-apex` middleware 301-redirects every Host(realsyncdynamicsai.de)
# request to GitHub Pages BEFORE any static-file backend is consulted.
#
# Live verification on 2026-05-16:
#   curl -sI -L https://realsyncdynamicsai.de/  →  server: GitHub.com
#                                                  x-served-by: cache-chi-klot…
#
# So one of two things is true:
#   A) The shipped dist/ is dead weight and this workflow burns CI
#      minutes for no production effect — workflow + matching nginx
#      vhost (deploy/nginx/realsyncdynamicsai.de.conf) should be deleted.
#   B) There is a separate compose file or systemd-managed nginx on the
#      VPS (not in git) that serves these files for some surface I
#      cannot see from the repository — that surface should be added
#      to docker-compose.yml so the topology is reproducible.
#
# DO NOT delete this workflow until an operator has SSH'd into the VPS
# and confirmed which of the two scenarios is true. See
# docs/runtime/production-runtime.md §"Ambiguous artifacts".
# ─────────────────────────────────────────────────────────────────
#
# Builds the Vite app and ships dist/ to the production VPS via SSH+rsync.
# Triggers on push to main when frontend sources change, plus manual dispatch.
#
# Required repo secrets:
#   VPS_SSH_HOST            currently 187.77.89.1 (Hostinger srv1622293) — older
#                            value 72.61.89.191 is the obsolete frontend VPS,
#                            don't use it
#   VPS_SSH_USER            e.g. deploy
#   VPS_SSH_KEY             OpenSSH private key (BEGIN OPENSSH PRIVATE KEY ...)
#   VPS_SSH_KNOWN_HOST      output of `ssh-keyscan -t ed25519 <host>`
#   VPS_FRONTEND_PATH       absolute path on VPS, currently
#                            /var/www/realsyncdynamicsai.de/dist (bind-mounted
#                            into the kodee-frontend nginx container — see
#                            deploy/ollama-traefik/docker-compose.yml)
#                            ⚠ NOTE 2026-05-16: kodee-frontend container is
#                            NOT in that docker-compose. See STATUS above.
#   VITE_SUPABASE_URL       e.g. https://ebljyceifhnlzhjfyxup.supabase.co
#   VITE_SUPABASE_ANON_KEY  Supabase anon public key (baked into the bundle)
#
# Missing secrets fail the job fast at the verify step.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + ship to VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=""
          for key in VPS_SSH_HOST VPS_SSH_USER VPS_SSH_KEY VPS_SSH_KNOWN_HOST VPS_FRONTEND_PATH VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            value=$(jq -r --arg k "$key" '.[$k] // empty' <<<'${{ toJson(secrets) }}')
            [ -z "$value" ] && missing="$missing $key"
          done
          if [ -n "$missing" ]; then
            echo "❌ missing secrets:$missing"
            echo "set them under repo Settings → Secrets and variables → Actions"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Playwright Chromium for prerender
        run: npx playwright install chromium --with-deps

      - name: Pre-render top routes (priority >= 0.6)
        # Erzeugt static HTML pro Route in dist/<route>/index.html, damit
        # nicht-JS-rendering Crawler (LinkedIn, Slack, archive.org) den
        # vollständigen hydrierten Content sehen statt nur den SPA-Shell.
        # SKIP_PRERENDER=1 wenn schnell deploy ohne Prerender nötig.
        run: npm run prerender
        env:
          PRERENDER_PRIORITY_MIN: '0.6'
          PRERENDER_CONCURRENCY: '3'
          # Fail wenn rendered routes < expected — verhindert silent SEO-Regression
          PRERENDER_STRICT: '1'
          # Vite preview braucht die Supabase-Keys zur Laufzeit (auch wenn
          # nicht alle Routes Supabase-Calls machen — Hydration evaluiert die env)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync dist/ to VPS
        run: |
          rsync \
            --archive \
            --delete \
            --compress \
            --human-readable \
            --stats \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            dist/ \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:${{ secrets.VPS_FRONTEND_PATH }}/"

      - name: Smoke-test the public URL
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L https://realsyncdynamicsai.de/ || echo "000")
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 3
          done
          echo "::warning::public URL did not return 200; check Traefik labels on kodee-frontend container + DNS"
