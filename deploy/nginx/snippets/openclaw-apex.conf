# /etc/nginx/snippets/openclaw-apex.conf
#
# Apex-Path-Fallback fuer den OpenClaw-Compliance-Agent. Wird vom Apex-Vhost
# realsyncdynamicsai.de.conf via `include` reingezogen, damit kein eigener
# DNS-Record + cert noetig ist. Parallel zur eigenen Subdomain
# api.realsyncdynamicsai.de — beide Endpoints zeigen auf 127.0.0.1:3001.
#
# Oeffentliche Routen:
#   GET  /_openclaw/healthz       → upstream /healthz
#   POST /_openclaw/api/chat      → upstream /api/chat  (Bearer-Auth im Agent)
#   GET  /_openclaw/ws            → upstream /ws        (WebSocket-Upgrade)
#
# Alles andere unter /_openclaw/ → 404. Auth + CORS macht der Agent selber
# (OPENCLAW_SECRET, OPENCLAW_CORS_ORIGINS in /etc/openclaw-agent/env).

# Health — exact match, kein Rewrite noetig
location = /_openclaw/healthz {
    proxy_pass http://127.0.0.1:3001/healthz;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout    10s;
}

# Chat — long-running Tool-Call-Roundtrip, grosszuegige Timeouts
location = /_openclaw/api/chat {
    proxy_pass http://127.0.0.1:3001/api/chat;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;

    proxy_connect_timeout 10s;
    proxy_send_timeout    90s;
    proxy_read_timeout    90s;
    proxy_buffering       off;
    client_max_body_size  2m;
}

# WebSocket — Upgrade-Header weiterreichen, 1h Idle-Timeout
location = /_openclaw/ws {
    proxy_pass http://127.0.0.1:3001/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout    3600s;
    proxy_read_timeout    3600s;
}

# Catch-all unter dem Prefix — verhindert versehentliches Exposen interner Routen
location ^~ /_openclaw/ {
    add_header Content-Type application/json always;
    return 404 '{"error":"not found"}';
}
