# Supabase local development config.
# https://supabase.com/docs/guides/cli/config
#
# Used by `supabase start` (local stack) and `supabase db reset`. Project-link
# data lives outside the repo (~/.supabase) and is unrelated to this file.

project_id = "realsyncdynamics-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329

[realtime]
enabled = true

[studio]
enabled = false

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[edge_runtime]
enabled = false

[analytics]
enabled = false

# ──────────────────────────────────────────────────────────────────────────
# Per-function verify_jwt config.
#
# `supabase functions deploy` reads this for each function. Default is true.
# Anything listed here as false bypasses the platform JWT gateway — the
# function itself is responsible for its own auth (HMAC signature, signed
# tokens, public free-tool semantics, cron-triggered, etc.).
#
# CRITICAL: webhook receivers (stripe-webhook, shopify-webhooks,
# governance-ingest, governance-webhooks, workflow-callback,
# newsletter-confirm) MUST stay false — external callers cannot send a
# Supabase JWT. Same goes for OAuth callbacks (shopify-callback) and
# Stripe-redirect handoffs (checkout-website-rebuild).
# ──────────────────────────────────────────────────────────────────────────

# ── External webhooks (no JWT possible) ──
[functions.stripe-webhook]
verify_jwt = false

[functions.shopify-webhooks]
verify_jwt = false

[functions.shopify-callback]
verify_jwt = false

[functions.workflow-callback]
verify_jwt = false

[functions.automation-callback]
verify_jwt = false

[functions.governance-ingest]
verify_jwt = false

[functions.governance-webhooks]
verify_jwt = false

[functions.newsletter-confirm]
verify_jwt = false

[functions.checkout-website-rebuild]
verify_jwt = false

# ── Public free tools / anonymous ingress ──
[functions.gdpr-audit]
verify_jwt = false

# Audit-Report-Email: fire-and-forget vom Browser nach dem Scan (kein JWT).
# Sicher: Zugriff nur per UUID, idempotent (email_sent_at-Guard).
[functions.audit-report-email]
verify_jwt = false

# Health-Probe — oeffentlich, fuer Uptime-Monitoring und Status-Page.
# Antwortet 200 / 503; keine sensiblen Daten, keine Auth noetig.
[functions.health]
verify_jwt = false

[functions.cookie-scan]
verify_jwt = false

[functions.cookie-scan-deep]
verify_jwt = false

# AI Gateway — provider-neutral inference endpoint. Public per spec
# (frontend talks to it directly without bearer tokens). The actual auth
# + rate-limit + tenant-scope checks live inside the function once it
# starts handling tenant-scoped traffic in a follow-up PR.
[functions.ai-gateway]
verify_jwt = false

[functions.audit-report-pdf]
verify_jwt = false

[functions.sales-lead]
verify_jwt = false

[functions.newsletter-subscribe]
verify_jwt = false

[functions.track-pageview]
verify_jwt = false

[functions.marketing-event]
verify_jwt = false

[functions.telemetry-ai-event]
verify_jwt = false

[functions.welcome-email]
verify_jwt = false

[functions.shopify-install]
verify_jwt = false

[functions.rebuild-website]
verify_jwt = false

[functions.market-scanner]
verify_jwt = false

[functions.ai-act-classify]
verify_jwt = false

# ── Cron-triggered (pg_cron / GitHub Actions) ──
[functions.daily-digest]
verify_jwt = false

[functions.audit-drip-cron]
verify_jwt = false

[functions.audit-monitor-cron]
verify_jwt = false

[functions.audit-recheck-weekly]
verify_jwt = false

[functions.agent-os-runner]
verify_jwt = false

# governance-erasure-sweeper: pg_cron-triggered (daily 03:00 UTC). No user JWT;
# validates a Vault bearer token (governance_erasure_sweeper_token) itself.
[functions.governance-erasure-sweeper]
verify_jwt = false

[functions.business-metrics-cron]
verify_jwt = false

# Shared-secret auth (business_metrics_shared_secret), not user JWT.
[functions.stripe-meter-sync]
verify_jwt = false


# ── Enterprise AI OS public surfaces ──
[functions.enterprise-ai-os-discovery-intake]
verify_jwt = false

[functions.enterprise-ai-os-discovery-pending]
verify_jwt = false

[functions.enterprise-ai-os-agents-list]
verify_jwt = false

[functions.enterprise-ai-os-agents-run]
verify_jwt = false

[functions.enterprise-ai-os-evaluate]
verify_jwt = false

[functions.enterprise-ai-os-feedback]
verify_jwt = false

[functions.enterprise-ai-os-founding-access]
verify_jwt = false

[functions.enterprise-ai-os-agent-runs-list]
verify_jwt = false

# ── Governance public surfaces (were verify_jwt=false before the CI race) ──
[functions.governance-keys]
verify_jwt = false

[functions.governance-resources]
verify_jwt = false

[functions.governance-approvals]
verify_jwt = false

[functions.governance-risk-score]
verify_jwt = false

[functions.governance-dpias]
verify_jwt = false

[functions.governance-incidents]
verify_jwt = false

[functions.governance-connectors]
verify_jwt = false

# governance-dsr and governance-vendors do their own JWT + tenant-membership
# validation inside the function (same pattern as governance-dpias above),
# so the platform JWT gate is disabled here. Both are invoked from the SPA
# (src/features/governance/{dsrApi,vendorsApi}.ts) with the user's bearer
# token attached by supabase.functions.invoke.
[functions.governance-dsr]
verify_jwt = false

[functions.governance-vendors]
verify_jwt = false

# ── Legacy debug/setup helpers ──
# Previously held `verify_jwt = false` entries for `debug-secret-shape`,
# `vault-set-secret` and `vault-key-setter` — none of those functions
# exist in `supabase/functions/` any more. Leaving the per-function
# stanzas in place would auto-deploy a future re-add (or accidental
# rename) as a public endpoint, so the entries are removed entirely.
# Provision secrets directly via `supabase secrets set` or the Vault
# dashboard.

# ── Analytics ──
# governance-analytics-aggregator: daily cron job (00:15 UTC), no JWT needed
[functions.governance-analytics-aggregator]
verify_jwt = false

# governance-analytics-export: called from authenticated SPA clients with bearer token
# (no explicit verify_jwt entry = defaults to true, which is correct)

# ── Telegram integration ──
# telegram-webhook is called by Telegram's servers without any JWT.
[functions.telegram-webhook]
verify_jwt = false

# telegram-channels is called from the SPA with a user Bearer JWT.
[functions.telegram-channels]

# All other functions (stripe-checkout, stripe-portal, ai-invoke,
# workflow-trigger, gdpr-export, gdpr-delete, tenant-invite,
# governance-agent, governance-remediate,
# hostinger-agent-brief, kodee*, audit-report-email, generate-document,
# shopify-scan, skills, sub-processor-notify, evidence-vault-export,
# usage-increment, ceo-brief-pdf, pitch-deck-pdf) keep the default
# verify_jwt = true — they require an authenticated user session.
