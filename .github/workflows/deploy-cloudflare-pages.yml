name: Deploy to Cloudflare Pages

# ─────────────────────────────────────────────────────────────────
# CLOUDFLARE PAGES DEPLOYMENT PIPELINE
# ─────────────────────────────────────────────────────────────────
# Replaces GitHub Pages. Automatic deploy on push to main.
#
# Setup required (one-time):
# 1. Create Cloudflare Pages project (see deploy/cloudflare-pages/README.md)
# 2. Add secrets to GitHub (Settings > Secrets and variables > Actions):
#    - CLOUDFLARE_API_TOKEN
#    - CLOUDFLARE_ACCOUNT_ID
# 3. Add environment variables to GitHub Actions:
#    - VITE_SUPABASE_URL
#    - VITE_SUPABASE_ANON_KEY
#    - VITE_SENTRY_DSN (optional)
#    - VITE_STRIPE_PRICE_* (required)
#
# DNS setup:
# - Domain: realsyncdynamicsai.de
# - Current: GitHub Pages (185.199.108-111.153)
# - Target: Cloudflare Pages (via nameserver delegation)
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'wrangler.toml'
      - '_redirects'
      - '_headers'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint TypeScript
        run: npm run lint

      - name: Build Vite
        env:
          VITE_BASE: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_STRIPE_PRICE_STARTER: ${{ secrets.VITE_STRIPE_PRICE_STARTER }}
          VITE_STRIPE_PRICE_GROWTH: ${{ secrets.VITE_STRIPE_PRICE_GROWTH }}
          VITE_STRIPE_PRICE_AGENCY: ${{ secrets.VITE_STRIPE_PRICE_AGENCY }}
        run: npm run build

      - name: Prerender high-priority routes
        run: |
          npx playwright install --with-deps chromium
          npm run prerender

      - name: Generate SPA fallback for dynamic routes
        run: |
          cp dist/index.html dist/404.html
          python3 - <<'PY'
          import os, re, shutil
          # Prerender routes from sitemap
          with open('public/sitemap.xml', 'r', encoding='utf-8') as f:
              xml = f.read()
          paths = re.findall(r'https?://realsyncdynamicsai\.de(/[^<\s]*)', xml)
          paths = set(p.rstrip('/') for p in paths if p and p != '/')

          # App routes (authenticated, not in sitemap)
          APP_ROUTES = [
              '/os', '/os/pricing',
              '/app', '/app/websites', '/app/ai-systems', '/app/automations', '/app/risks',
              '/app/compliance', '/app/evidence', '/app/monitoring',
              '/app/team', '/app/settings', '/app/company', '/assistant',
              '/dashboard', '/command-center',
              '/governance', '/governance/admin', '/governance/agents',
              '/governance/incidents', '/governance/dpias', '/governance/dsr',
              '/governance/vendors', '/governance/reports', '/governance/auditor',
              '/governance/admin-log', '/governance/approvals', '/governance/scans',
              '/evidence', '/monitoring', '/runtime',
              '/settings', '/settings/team', '/settings/security',
              '/settings/account', '/settings/ai-residency', '/settings/api-keys',
              '/billing/usage', '/tenant/invites',
              '/checkout/starter', '/checkout/growth', '/checkout/agency',
          ]
          paths = sorted(paths | set(APP_ROUTES))
          src = 'dist/index.html'
          filled, skipped = 0, 0
          for p in paths:
              dest_dir = 'dist' + p
              dest_file = os.path.join(dest_dir, 'index.html')
              if os.path.exists(dest_file):
                  skipped += 1
                  continue
              os.makedirs(dest_dir, exist_ok=True)
              shutil.copyfile(src, dest_file)
              filled += 1
          print(f'spa-fallback: {filled} filled · {skipped} kept-prerendered')
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Fail-fast mit klarer Meldung, wenn die Cloudflare-Credentials fehlen.
      # Ohne diese deployt Pages NICHT — die Live-Site bleibt dann HTTP 500.
      # Haeufige Ursache: Secret als *Environment*-Secret statt Repo-Secret
      # hinterlegt (dann muesste der Job `environment:` deklarieren), oder
      # unter abweichendem Namen. Erwartet: Repo → Settings → Secrets and
      # variables → Actions → CLOUDFLARE_API_TOKEN und CLOUDFLARE_ACCOUNT_ID.
      - name: Verify Cloudflare credentials present
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=""
          [ -z "$CF_API_TOKEN" ] && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "$CF_ACCOUNT_ID" ] && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Fehlende GitHub-Actions-Secrets:$missing — bitte unter Repo → Settings → Secrets and variables → Actions als Repository-Secret hinterlegen. Ohne sie kann Cloudflare Pages nicht deployen und die Live-Site bleibt HTTP 500."
            exit 1
          fi
          echo "✓ Cloudflare-Credentials vorhanden"

      # cloudflare/pages-action@v1 ist deprecated (lehnt u. a. `productionBranch`
      # ab). Maintainter Weg: wrangler-action@v3 mit `pages deploy`.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=realsyncdynamics-ai --branch=main

  smoke-test:
    name: Smoke test live routes
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CDN propagation
        run: sleep 15

      - name: Check critical routes
        run: |
          BASE="https://realsyncdynamicsai.de"
          ROUTES="/ /pricing /audit /governance-runtime /app"
          FAILED=""
          for path in $ROUTES; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 15 "${BASE}${path}" || echo "000")
            echo "${path}  →  HTTP ${code}"
            if [ "$code" != "200" ]; then
              FAILED="$FAILED $path(${code})"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Smoke-test failed for:$FAILED"
            exit 1
          fi
          echo "✓ All routes returned 200"
