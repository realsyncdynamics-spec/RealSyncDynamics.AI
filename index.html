    <!--
      Security headers via meta-equivalents.
      GitHub Pages doesn't let us set HTTP-headers, so we declare what we can:
      CSP frame-ancestors prevents iframe-clickjacking; X-Content-Type sniffing-Schutz;
      Referrer-Policy für privacy. These improve our own /audit score significantly.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="frame-ancestors 'self'; default-src 'self' https://*.supabase.co https://api.fontshare.com data:; script-src 'self' 'unsafe-inline' https://connect.facebook.net https://www.googletagmanager.com https://www.google-analytics.com https://analytics.tiktok.com https://snap.licdn.com; style-src 'self' 'unsafe-inline' https://api.fontshare.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://*.supabase.in https://www.facebook.com https://www.google-analytics.com https://analytics.tiktok.com https://*.tiktok.com https://px.ads.linkedin.com" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="https://realsyncdynamicsai.de/" />
    <!--
      JSON-LD structured data: SoftwareApplication + Organization + FAQ.
      Enables rich snippets in Google for queries like "DSGVO KI Plattform",
      "AI Act Compliance Tool". Hard-coded; React doesn't need to manage it.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://realsyncdynamicsai.de/#org",
          "name": "RealSync Dynamics",
          "url": "https://realsyncdynamicsai.de/",
          "description": "EU-konforme KI-Compliance-Plattform für regulierte Branchen (HealthTech, Legal, FinTech, Behörden).",
          "areaServed": "DE"
        },
        {
          "@type": "SoftwareApplication",
          "name": "RealSyncDynamics.AI",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "DSGVO-konforme KI-Plattform mit EU-Datenresidenz, lückenlosem Audit-Trail und automatisierter DSGVO-Selfservice (Art. 15 + 17). Konform mit DSGVO Art. 32, AI Act, BAIT, MaRisk.",
          "offers": [
            {"@type": "Offer", "name": "Bronze", "price": "29", "priceCurrency": "EUR"},
            {"@type": "Offer", "name": "Silver", "price": "99", "priceCurrency": "EUR"},
            {"@type": "Offer", "name": "Gold", "price": "299", "priceCurrency": "EUR"}
          ],
          "publisher": {"@id": "https://realsyncdynamicsai.de/#org"}
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Ist RealSyncDynamics.AI DSGVO-konform?",
              "acceptedAnswer": {"@type": "Answer", "text": "Ja. EU-Datenresidenz, AVV gemäß DSGVO Art. 28 inklusive, lückenloser Audit-Trail (Art. 32) und automatisierter Selfservice für Auskunfts- und Löschrechte (Art. 15 + 17)."}
            },
            {
              "@type": "Question",
              "name": "Erfüllt die Plattform den AI Act?",
              "acceptedAnswer": {"@type": "Answer", "text": "Ja. Risiko-Klassifikation, technische Dokumentation, Transparenzpflichten und Human-Oversight sind in der Plattform integriert."}
            },
            {
              "@type": "Question",
              "name": "Werden Daten in die USA übertragen?",
              "acceptedAnswer": {"@type": "Answer", "text": "Standardmäßig nein. EU-Datenresidenz ist Default; Schrems-II-Konformität durch EU-Hosting (Frankfurt) und optional self-hosted Ollama für vollständige Datenhoheit."}

        }
      ]
    }
    </script>
    <script type="text/javascript">
      // SPA on GitHub Pages — restore deep-link path written by 404.html.
      // Pattern: rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
