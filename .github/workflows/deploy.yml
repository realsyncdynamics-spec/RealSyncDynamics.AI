name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: 'Deploy edge functions?'
        type: boolean
        default: false

jobs:
  db-push:
    name: Push migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
      # Frueher: "supabase db push --include-all 2>&1 || true" — das hat JEDEN
      # Migrationsfehler still verschluckt (Job blieb gruen). Genau das hat den
      # P0a-Constraint-Fehler zunaechst unsichtbar gemacht.
      #
      # Eine spaetere Zwischenstufe erfasste den Exit-Code zwar als ::error +
      # Step-Summary, liess den Job aber NICHT hart fehlschlagen — eine
      # ::error::-Annotation allein faellt den Job nicht, nur ein Exit-Code != 0.
      # Damit blieb der Job gruen, obwohl KEINE Migration deployt wurde
      # (P0.2 / 20260626000000 erreichte Prod nie).
      #
      # Neu: bei jedem db-push-Fehler exit != 0 -> der Job faellt hart. Solange
      # der Remote-Ledger-Drift (Orphan-Version 20260510, siehe
      # docs/infra/migration-drift.md) nicht reconciled ist, schlaegt dieser Job
      # bewusst fehl — das ist der ehrliche Zustand: Migrationen deployen derzeit
      # NICHT. functions-deploy laeuft unabhaengig (kein needs) weiter.
      - name: Push migrations
        run: |
          set +e
          supabase db push --include-all 2>&1 | tee /tmp/db-push.log
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -ne 0 ]; then
            echo "::error::supabase db push exited with code $code — Migration nicht sauber durchgelaufen (siehe Log)."
            echo "## db push fehlgeschlagen (exit $code)" >> "$GITHUB_STEP_SUMMARY"
            tail -n 20 /tmp/db-push.log >> "$GITHUB_STEP_SUMMARY"
            exit "$code"
          else
            echo "db push erfolgreich" >> "$GITHUB_STEP_SUMMARY"
          fi

  functions-deploy:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
