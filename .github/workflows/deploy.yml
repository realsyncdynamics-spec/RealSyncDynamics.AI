name: Deploy

# Pushes pending migrations and (optionally) edge functions to the linked
# Supabase project. Auto-runs on main; manual via workflow_dispatch.
#
# Required repository secrets:
#   SUPABASE_ACCESS_TOKEN    personal access token (account -> Access Tokens)
#   SUPABASE_PROJECT_ID      project ref (the xxxx in xxxx.supabase.co)
#   SUPABASE_DB_PASSWORD     the linked project's DB password
#
# If any of these secrets is unset, the job fails fast - that's intentional;
# we'd rather not silently no-op a deploy.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: 'Deploy edge functions too?'
        type: boolean
        default: false

jobs:
  db-push:
    name: Push migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=""
          [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "${{ secrets.SUPABASE_PROJECT_ID }}"   ] && missing="$missing SUPABASE_PROJECT_ID"
          [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}"  ] && missing="$missing SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "missing secrets:$missing"
            echo "set them under repo Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Repair remote-only migrations
        run: |
          supabase migration list --linked 2>&1 | grep -E "^[[:space:]]*[0-9]{14}" | while IFS= read -r line; do
            version=$(echo "$line" | grep -oE '[0-9]{14}' | head -1)
            if echo "$line" | grep -qi "REMOTE"; then
              if [ -n "$version" ] && ! ls supabase/migrations/${version}_*.sql 2>/dev/null | grep -q .; then
                echo "Marking remote-only migration $version as reverted"
                supabase migration repair --status reverted "$version" || true
              fi
            fi
          done || true

      - name: Diff against remote (informational)
        run: supabase db diff --linked --schema public || true

      - name: Push pending migrations
        run: supabase db push

  functions-deploy:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    needs: db-push
    if: github.event_name == 'push' || inputs.deploy_functions == true
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: |
          supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
